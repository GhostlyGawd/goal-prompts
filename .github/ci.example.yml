# Optional GitHub Actions CI. To enable: move this file to
# .github/workflows/ci.yml (pushing workflow files needs the 'workflow'
# OAuth scope, so do it via github.com or a token that has it).
# The live gate already runs on Vercel: every push executes build.py
# and a failing build blocks the deploy.
name: check
on: [push, pull_request]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Full gate (build + lint tests + JS syntax + MCP smoke)
        run: scripts/check
      - name: Fail on drift between sources and generated files
        run: |
          git diff --exit-code index.html catalog.json commands.tar.gz commands.zip checksums.txt || {
            echo "::error::Generated files are out of date. Run 'scripts/check' (or 'python3 build.py') and commit."
            exit 1
          }
