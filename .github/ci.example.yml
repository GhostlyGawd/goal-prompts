# Optional GitHub Actions CI. To enable: move this file to
# .github/workflows/ci.yml (pushing workflow files needs the 'workflow'
# OAuth scope, so do it via github.com or a token that has it).
# The live gate already runs on Vercel: every push executes build.py
# and a failing build blocks the deploy.
name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (fails if any brief exceeds 4k chars)
        run: sh scripts/check
      - name: Fail on drift between sources and generated files
        run: |
          git diff --exit-code index.html studio catalog.json checksums.txt commands.tar.gz commands.zip raw b || {
            echo "::error::Generated files are out of date. Run 'python3 build.py' and commit."
            exit 1
          }
