name: build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build (fails if any brief exceeds 4k chars)
        run: python3 build.py
      - name: Fail on drift between sources and generated files
        run: |
          git diff --exit-code index.html commands.tar.gz commands.zip || {
            echo "::error::Generated files are out of date. Run 'python3 build.py' and commit."
            exit 1
          }
